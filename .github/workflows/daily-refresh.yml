name: Daily Portfolio Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"
    - cron: "30 23 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  rebuild-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rebuild dashboard outputs
        run: python portfolio_dashboard.py

      - name: Commit refreshed data snapshot
        run: |
          if git diff --quiet -- web/public/data/; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/data/
          git commit -m "Refresh portfolio data snapshot"
          git push

      - name: Prepare GitHub Pages files
        run: |
          mkdir -p site
          cp outputs/quant_dashboard.html site/index.html
          cp outputs/*.csv site/
          cp outputs/dashboard_data.json site/

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-dashboard-outputs
          path: outputs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy-pages:
    needs: rebuild-dashboard
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
