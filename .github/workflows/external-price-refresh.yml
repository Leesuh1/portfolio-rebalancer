name: External Asset Price Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0,20,40 * * * *"

permissions:
  contents: write

jobs:
  refresh-external-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh external asset prices only
        run: python portfolio_dashboard.py --external-price-only

      - name: Commit refreshed external asset snapshot
        run: |
          if git diff --quiet -- web/public/data/; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/data/
          git commit -m "Refresh external asset prices"
          git push
