name: Domestic Price Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "10,30,50 0-6 * * 1-5"

permissions:
  contents: write

jobs:
  refresh-domestic-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh domestic prices only
        run: python portfolio_dashboard.py --domestic-price-only

      - name: Commit refreshed price snapshot
        run: |
          if git diff --quiet -- web/public/data/; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/data/
          git commit -m "Refresh domestic stock prices"
          git push
